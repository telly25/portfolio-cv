backend:
  name: git-gateway
  branch: dev

media_folder: "assets"
public_folder: "/assets"

i18n:
  structure: multiple_files
  locales: [fr, en]
  default_locale: fr

collections:
  - name: "translations"
    label: "Contenu du site"
    i18n: true
    files:
      - name: "content"
        label: "Textes (FR / EN)"
        file: "locales/fr.json"
        i18n:
          structure: multiple_files
          locales: [fr, en]
        fields:

          # ── META ──────────────────────────────────────────────────────────
          - { label: "Titre meta", name: "meta_title", widget: "string", i18n: true }
          - { label: "Description meta", name: "meta_desc", widget: "text", i18n: true }

          # ── NAVIGATION ────────────────────────────────────────────────────
          - label: "Navigation"
            name: "nav"
            widget: "object"
            collapsed: true
            i18n: true
            fields:
              - { label: "Accueil", name: "nav_home", widget: "string", i18n: true }
              - { label: "Profil", name: "nav_profile", widget: "string", i18n: true }
              - { label: "Expertise", name: "nav_expertise", widget: "string", i18n: true }
              - { label: "Parcours", name: "nav_experience", widget: "string", i18n: true }
              - { label: "Projets", name: "nav_projects", widget: "string", i18n: true }
              - { label: "Contact", name: "nav_contact", widget: "string", i18n: true }
              - { label: "Lien langue (menu mobile)", name: "nav_mob_lang", widget: "string", i18n: true }

          # ── HERO ──────────────────────────────────────────────────────────
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            i18n: true
            fields:
              - { label: "Tag (ligne de présentation)", name: "hero_tag", widget: "string", i18n: true }
              - { label: "Mots typewriter (séparés par virgule)", name: "hero_typewriter_words", widget: "list", i18n: true }
              - { label: "Typewriter aria-label", name: "hero_typewriter_aria", widget: "string", i18n: true }
              - { label: "Pitch (accroche sous typewriter)", name: "hero_pitch", widget: "text", i18n: true }
              - { label: "Titre ligne 1", name: "hero_title1", widget: "string", i18n: true }
              - { label: "Titre ligne 2", name: "hero_title2", widget: "string", i18n: true }
              - { label: "Titre ligne 3", name: "hero_title3", widget: "string", i18n: true }
              - { label: "Sous-titre (domaines)", name: "hero_sub", widget: "string", i18n: true }
              - { label: "Pill 1 (disponibilité)", name: "hero_pill1", widget: "string", i18n: true }
              - { label: "Pill 2 (type de contrat)", name: "hero_pill2", widget: "string", i18n: true }
              - { label: "Pill 3 (localisation)", name: "hero_pill3", widget: "string", i18n: true }
              - { label: "Bouton CV — texte", name: "hero_cta", widget: "string", i18n: true }
              - { label: "Bouton CV — fichier (nom du PDF)", name: "hero_cta_href", widget: "string", i18n: true }
              - { label: "Bouton CV — aria-label", name: "hero_cta_aria", widget: "string", i18n: true }
              - { label: "Bouton contact — texte", name: "hero_ghost", widget: "string", i18n: true }
              - { label: "Bouton contact — aria-label", name: "hero_ghost_aria", widget: "string", i18n: true }
              - { label: "Note recruteur", name: "hero_recruiter", widget: "text", i18n: true }

          # ── PROFIL ────────────────────────────────────────────────────────
          - label: "Profil"
            name: "profile"
            widget: "object"
            collapsed: true
            i18n: true
            fields:
              - { label: "Label section", name: "profile_label", widget: "string", i18n: true }
              - { label: "Accroche (intro)", name: "profile_intro", widget: "text", i18n: true }
              - { label: "Paragraphe 1", name: "profile_p1", widget: "text", i18n: true }
              - { label: "Paragraphe 2", name: "profile_p2", widget: "text", i18n: true }
              - { label: "Paragraphe 3", name: "profile_p3", widget: "text", i18n: true }
              - { label: "Card 1 — Titre", name: "profile_card1_title", widget: "string", i18n: true }
              - { label: "Card 1 — Sous-titre", name: "profile_card1_sub", widget: "string", i18n: true }
              - { label: "Card 1 — Texte", name: "profile_card1_text", widget: "text", i18n: true }
              - { label: "Card 2 — Titre", name: "profile_card2_title", widget: "string", i18n: true }
              - { label: "Card 2 — Sous-titre", name: "profile_card2_sub", widget: "string", i18n: true }
