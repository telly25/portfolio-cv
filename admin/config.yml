              - { label: "Card 2 — Titre", name: "exp_card2_title", widget: "string", i18n: true }
              - { label: "Card 2 — Item 1", name: "exp_card2_li1", widget: "string", i18n: true }
              - { label: "Card 2 — Item 2", name: "exp_card2_li2", widget: "string", i18n: true }
              - { label: "Card 2 — Item 3", name: "exp_card2_li3", widget: "string", i18n: true }
              - { label: "Card 2 — Item 4", name: "exp_card2_li4", widget: "string", i18n: true }
              - { label: "Card 3 — Titre", name: "exp_card3_title", widget: "string", i18n: true }
              - { label: "Card 3 — Item 1", name: "exp_card3_li1", widget: "string", i18n: true }
