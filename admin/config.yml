              - { label: "Card 1 — Item 1", name: "exp_card1_li1", widget: "string", i18n: true }
              - { label: "Card 1 — Item 2", name: "exp_card1_li2", widget: "string", i18n: true }
              - { label: "Card 1 — Item 3", name: "exp_card1_li3", widget: "string", i18n: true }
