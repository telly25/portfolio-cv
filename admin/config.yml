              - { label: "Card 7 — Item 2", name: "exp_card7_li2", widget: "string", i18n: true }
              - { label: "Card 7 — Item 3", name: "exp_card7_li3", widget: "string", i18n: true }
              - { label: "Card 7 — Item 4", name: "exp_card7_li4", widget: "string", i18n: true }
              - { label: "Card 8 — Titre", name: "exp_card8_title", widget: "string", i18n: true }
